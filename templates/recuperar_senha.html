<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha • NousCard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0,0,0,.08);
        }
        h1 {
            margin: 0 0 8px;
            color: #1f2937;
            font-size: 24px;
        }
        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1877f2;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #0f5dc7;
        }
        .voltar {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
        }
        .flash {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 14px;
            background: #eff6ff;
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Recuperar senha</h1>
        <p>Informe seu e-mail para receber as instruções de recuperação.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            {% if csrf_token %}
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {% endif %}

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="seuemail@dominio.com">

            <button type="submit">Enviar recuperação</button>
        </form>

        <a class="voltar" href="{{ url_for('auth.login_page') }}">← Voltar para o login</a>
    </div>
</body>
</html>
